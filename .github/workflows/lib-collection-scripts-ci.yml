name: Collection Scripts Library CI

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  EXTENSION_DIR: "."

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup repository
        uses: ./.github/actions/setup-repo
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript
        run: npm run build --workspace=lib

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: |
          npm run compile:tests --workspace=lib
          npm run test --workspace=lib

  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    environment: npmjs
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write  # Required for OIDC
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup repository
        uses: ./.github/actions/setup-repo
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Build TypeScript
        run: npm run build --workspace=lib

      - name: Check if version changed
        working-directory: lib
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          
          # Check if this version tag already exists
          if git tag -l "collection-scripts-v$PACKAGE_VERSION" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION already published"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Create version tag
        if: steps.version-check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "collection-scripts-v${{ steps.version-check.outputs.version }}"
          git push origin "collection-scripts-v${{ steps.version-check.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish package
        working-directory: lib
        if: steps.version-check.outputs.exists == 'false'
        run: npm publish --provenance --access public
